<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .status {
            font-size: 12px;
            color: #666;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3>AI Accessibility</h3>

        <div id="login-form">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Login & Sync</button>
        </div>

        <div id="profile-view" class="hidden">
            <p>Welcome, <span id="user-display"></span>!</p>
            <div class="container" style="border-top: 1px solid #eee; padding-top: 10px;">
                <label style="font-size: 13px;">
                    <input type="checkbox" id="smart-highlighting-toggle"> AI Smart Highlighting
                </label>
                <label style="font-size: 13px;">
                    <input type="checkbox" id="focus-mode-toggle"> AI Focus Mode
                </label>
            </div>
            <div class="status" style="margin-top: 10px;">Profile: <span id="profile-status">Synced</span></div>
            <button id="logout-btn" style="background: #dc3545; margin-top: 10px;">Logout</button>
        </div>

        <div id="message" class="status"></div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
